<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Register User</title>

    <style>
        body{
            font-family: Arial, sans-serif;
            background:#f4f6f9;
        }

        .container{
            width:400px;
            margin:50px auto;
            background:white;
            padding:30px;
            border-radius:10px;
            box-shadow:0 0 10px rgba(0,0,0,0.1);
        }

        h2{
            text-align:center;
            color:#1e3a8a;
        }

        input{
            width:100%;
            padding:10px;
            margin:10px 0;
            box-sizing:border-box;
        }

        button{
            width:100%;
            padding:10px;
            background:#2563eb;
            color:white;
            border:none;
            cursor:pointer;
        }
    </style>
</head>

<body>

<div class="container">

    <h2>User Registration</h2>

    <form th:action="@{/register}" method="post">

        <input type="text"
               name="fullName"
               placeholder="Full Name"
               required>

        <input type="email"
               name="email"
               placeholder="Email"
               required>

        <input type="password"
               name="password"
               placeholder="Password"
               required>

        <input type="text"
               name="role"
               placeholder="Role"
               required>

        <button type="submit">
            Register
        </button>

    </form>

</div>

</body>
</html>
